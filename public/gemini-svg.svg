<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="100%" height="100%">
  <!-- Group Utama Anyaman Geometris (Warna Emas Lurik) -->
  <g fill="#E5B81D">
    
    <!-- BARIS VERTIKAL (Benang Lungsin / Tiang Utama) -->
    <!-- Kolom Kiri (Pendek) -->
    <path d="M 120 150 L 155 125 L 155 350 L 120 350 Z" />
    
    <!-- Kolom Tengah (Sedang) -->
    <path d="M 175 90 L 210 65 L 210 375 L 175 375 Z" />
    
    <!-- Kolom Kanan (Tinggi) -->
    <path d="M 230 30 L 265 5 L 265 350 L 230 350 Z" />

    <!-- BARIS HORIZONTAL (Benang Pakan / Pengunci Anyaman) -->
    <!-- Balok Atas -->
    <rect x="175" y="170" width="145" height="40" rx="2" />
    <rect x="65" y="170" width="90" height="40" rx="2" />
    
    <!-- Balok Tengah -->
    <rect x="120" y="225" width="145" height="40" rx="2" />
    <rect x="280" y="225" width="55" height="40" rx="2" />
    <rect x="65" y="225" width="40" height="40" rx="2" />
    
    <!-- Balok Bawah -->
    <rect x="175" y="280" width="110" height="40" rx="2" />
    <rect x="95" y="280" width="65" height="40" rx="2" />
    
  </g>
</svg>
